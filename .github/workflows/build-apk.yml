                  reset.setOnClickListener(v -> {
                      zeroPitch = 0.0;
                      zeroRoll = 0.0;
                      toast("Cero reiniciado");
                  });

                  save.setOnClickListener(v -> saveMeasurement());
                  setContentView(scroll);

                  if (accelerometer == null) {
                      statusText.setText("SIN ACELERÓMETRO");
