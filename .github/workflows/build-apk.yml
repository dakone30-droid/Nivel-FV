name: Build NivelFV APK v5 Icono

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Create Android project
        run: |
          rm -rf app build.gradle settings.gradle
          mkdir -p app/src/main/java/com/dakone/nivelfv
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle <<'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'NivelFV'
          include ':app'
          GRADLE

          cat > build.gradle <<'GRADLE'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          GRADLE

          cat > app/build.gradle <<'GRADLE'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.dakone.nivelfv'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.dakone.nivelfv'
                  minSdk 23
                  targetSdk 35
                  versionCode 6
                  versionName '0.6-ejes-icono'
              }
          }
          GRADLE

          cat > app/src/main/res/values/styles.xml <<'XML'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:navigationBarColor">#080C18</item>
                  <item name="android:statusBarColor">#080C18</item>
                  <item name="android:windowActionModeOverlay">true</item>
              </style>
          </resources>
          XML

          cat > app/src/main/AndroidManifest.xml <<'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="Nivel FV"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:allowBackup="false"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:screenOrientation="portrait"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML



          mkdir -p app/src/main/res/mipmap-xxxhdpi
          base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png <<'B64'
