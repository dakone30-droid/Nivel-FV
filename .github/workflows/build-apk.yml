              private EditText input(String hint, boolean number) {
                  EditText e = new EditText(this);
                  e.setHint(hint);
                  e.setHintTextColor(Color.rgb(95, 112, 140));
                  e.setTextColor(TEXT);
                  e.setTextSize(16);
                  e.setSingleLine(true);
                  e.setPadding(dp(12), dp(8), dp(12), dp(8));
                  e.setBackground(inputBg());
                  if (number) e.setInputType(InputType.TYPE_CLASS_NUMBER | InputType.TYPE_NUMBER_FLAG_DECIMAL | InputType.TYPE_NUMBER_FLAG_SIGNED);
                  return e;
              }

              private GradientDrawable inputBg() {
                  GradientDrawable gd = new GradientDrawable();
                  gd.setColor(Color.rgb(7, 13, 28));
                  gd.setCornerRadius(dp(14));
                  gd.setStroke(dp(1), Color.argb(70, 57, 220, 255));
                  return gd;
              }

              private Button button(String text, int stroke, int fill) {
                  Button b = new Button(this);
                  b.setText(text);
                  b.setTextColor(TEXT);
                  b.setTextSize(15);
                  b.setAllCaps(false);
                  b.setTypeface(Typeface.DEFAULT_BOLD);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(fill);
                  bg.setCornerRadius(dp(16));
                  bg.setStroke(dp(1), stroke);
                  b.setBackground(bg);
                  b.setPadding(dp(8), dp(8), dp(8), dp(8));
                  return b;
              }

              private LinearLayout.LayoutParams lp(int w, int h, int l, int t, int r, int b) {
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(w, h);
                  p.setMargins(dp(l), dp(t), dp(r), dp(b));
                  return p;
              }

              private LinearLayout.LayoutParams weightLp(float weight, int l, int t, int r, int b) {
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, weight);
                  p.setMargins(dp(l), dp(t), dp(r), dp(b));
                  return p;
              }

              private int dp(int v) {
                  return (int) (v * getResources().getDisplayMetrics().density + 0.5f);
              }

              public static class BubbleView extends View {
                  private final Paint paint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  private double pitchError = 0;
                  private double rollError = 0;
                  private double tolerance = 1.0;
                  private double displayPitchError = 0.0;
                  private double displayRollError = 0.0;

                  public BubbleView(Context context) {
                      super(context);
                      setBackground(makeBg(context));
                  }

                  private static GradientDrawable makeBg(Context context) {
                      GradientDrawable bg = new GradientDrawable(GradientDrawable.Orientation.TL_BR,
                              new int[]{Color.rgb(12, 21, 43), Color.rgb(5, 10, 22)});
                      bg.setCornerRadius((int) (24 * context.getResources().getDisplayMetrics().density));
                      bg.setStroke((int) (1 * context.getResources().getDisplayMetrics().density), Color.argb(100, 57, 220, 255));
                      return bg;
                  }

                  public void setValues(double pitchError, double rollError, double tolerance) {
                      this.pitchError = pitchError;
                      this.rollError = rollError;
                      this.tolerance = Math.max(0.05, tolerance);
                      // Respuesta rápida: poco suavizado para que no parezca que la bola llega tarde.
                      displayPitchError = displayPitchError * 0.35 + pitchError * 0.65;
                      displayRollError = displayRollError * 0.35 + rollError * 0.65;
                      invalidate();
                  }

                  @Override
                  protected void onDraw(Canvas canvas) {
                      super.onDraw(canvas);
                      int w = getWidth();
                      int h = getHeight();
                      float cx = w / 2f;
                      float cy = h / 2f;
                      float radius = Math.min(w, h) * 0.36f;

                      paint.setStyle(Paint.Style.STROKE);
                      paint.setStrokeWidth(2f);
                      paint.setColor(Color.argb(70, 57, 220, 255));
                      canvas.drawCircle(cx, cy, radius, paint);
                      canvas.drawCircle(cx, cy, radius * (50f / 70f), paint);
                      canvas.drawCircle(cx, cy, radius * (30f / 70f), paint);
                      canvas.drawCircle(cx, cy, radius * (10f / 70f), paint);
                      canvas.drawLine(cx - radius, cy, cx + radius, cy, paint);
                      canvas.drawLine(cx, cy - radius, cx, cy + radius, paint);

                      paint.setStyle(Paint.Style.FILL);
                      paint.setColor(Color.argb(18, 57, 220, 255));
                      canvas.drawOval(new RectF(cx - radius, cy - radius, cx + radius, cy + radius), paint);

                      // Rango visual solar: ±70°. Ejes corregidos para móvil en vertical:
                      // - levantar la parte de la cámara frontal mueve la bola hacia arriba
                      // - inclinar/girar el móvil a la izquierda mueve la bola a izquierda/derecha, no hacia abajo
                      float fullRangeDeg = 70f;
                      float scale = radius / fullRangeDeg;
                      float bx = clamp(cx + (float) displayPitchError * scale, cx - radius, cx + radius);
                      float by = clamp(cy - (float) displayRollError * scale, cy - radius, cy + radius);
                      double error = Math.max(Math.abs(pitchError), Math.abs(rollError));
                      int color = error <= tolerance ? Color.rgb(51, 255, 152) : (error <= tolerance * 2.0 ? Color.rgb(255, 193, 84) : Color.rgb(255, 82, 108));

                      paint.setStyle(Paint.Style.FILL);
                      paint.setColor(Color.argb(65, Color.red(color), Color.green(color), Color.blue(color)));
                      canvas.drawCircle(bx, by, radius * 0.18f, paint);
                      paint.setColor(color);
                      canvas.drawCircle(bx, by, radius * 0.11f, paint);

                      paint.setTextAlign(Paint.Align.CENTER);
                      paint.setTypeface(Typeface.DEFAULT_BOLD);
                      paint.setTextSize(34f);
                      paint.setColor(Color.rgb(235, 243, 255));
                      canvas.drawText(String.format(Locale.US, "%+.2f°", error), cx, h - 42f, paint);
                      paint.setTypeface(Typeface.DEFAULT);
                      paint.setTextSize(22f);
                      paint.setColor(Color.rgb(144, 161, 188));
                      canvas.drawText("rango visual ±70°", cx, h - 16f, paint);
                  }

                  private float clamp(float v, float min, float max) {
                      return Math.max(min, Math.min(max, v));
                  }
              }
          }
