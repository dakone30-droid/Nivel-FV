              private SensorManager sensorManager;
              private Sensor accelerometer;
              private TextView pitchText, rollText, statusText, errorText, savedText, sensorText;
              private EditText nameInput, targetInput, toleranceInput;
              private BubbleView bubbleView;

              private final float[] gravity = new float[]{0f, 0f, 0f};
              private double pitch = 0.0;
              private double roll = 0.0;
              private double zeroPitch = 0.0;
              private double zeroRoll = 0.0;
              private boolean hasValue = false;
              private long lastVibration = 0;
              private long lastUiUpdate = 0;
              private int eventCount = 0;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
