                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  getWindow().setStatusBarColor(BG);
                  getWindow().setNavigationBarColor(BG);

                  sensorManager = (SensorManager) getSystemService(Context.SENSOR_SERVICE);
                  accelerometer = sensorManager == null ? null : sensorManager.getDefaultSensor(Sensor.TYPE_ACCELEROMETER);

                  ScrollView scroll = new ScrollView(this);
                  scroll.setFillViewport(true);
                  scroll.setBackgroundColor(BG);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(18), dp(58), dp(18), dp(28));
                  scroll.addView(root);

                  TextView title = new TextView(this);
                  title.setText("NIVEL FV");
                  title.setTextColor(TEXT);
                  title.setTextSize(34);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER);
                  title.setLetterSpacing(0.12f);
                  root.addView(title, lp(-1, -2, 0, 0, 0, 2));

                  TextView subtitle = new TextView(this);
                  subtitle.setText("inclinómetro solar · ejes corregidos · ±70°");
                  subtitle.setTextColor(CYAN);
                  subtitle.setTextSize(14);
                  subtitle.setGravity(Gravity.CENTER);
                  root.addView(subtitle, lp(-1, -2, 0, 0, 0, 6));

                  TextView byDakone = new TextView(this);
                  byDakone.setText("Realizado por DaKoNe");
                  byDakone.setTextColor(Color.rgb(180, 240, 255));
                  byDakone.setTextSize(13);
                  byDakone.setGravity(Gravity.CENTER);
                  byDakone.setTypeface(Typeface.DEFAULT_BOLD);
                  root.addView(byDakone, lp(-1, -2, 0, 0, 0, 14));

                  LinearLayout statusCard = card();
                  statusText = new TextView(this);
                  statusText.setText("ESPERANDO SENSOR");
                  statusText.setTextSize(22);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setTypeface(Typeface.DEFAULT_BOLD);
                  statusText.setTextColor(AMBER);
                  statusCard.addView(statusText, lp(-1, -2, 0, 0, 0, 6));

                  errorText = new TextView(this);
                  errorText.setText("desviación: --°");
                  errorText.setTextSize(15);
                  errorText.setTextColor(MUTED);
                  errorText.setGravity(Gravity.CENTER);
                  statusCard.addView(errorText);
                  root.addView(statusCard, lp(-1, -2, 0, 0, 0, 12));

                  bubbleView = new BubbleView(this);
                  root.addView(bubbleView, lp(-1, dp(240), 0, 0, 0, 12));

                  LinearLayout grid = new LinearLayout(this);
                  grid.setOrientation(LinearLayout.HORIZONTAL);
                  grid.setBaselineAligned(false);
                  LinearLayout cardPitch = metricCard("LONGITUDINAL");
                  pitchText = valueText("--°");
                  cardPitch.addView(pitchText);
                  LinearLayout cardRoll = metricCard("TRANSVERSAL");
                  rollText = valueText("--°");
                  cardRoll.addView(rollText);
                  grid.addView(cardPitch, weightLp(1f, 0, 0, 6, 0));
                  grid.addView(cardRoll, weightLp(1f, 6, 0, 0, 0));
                  root.addView(grid, lp(-1, -2, 0, 0, 0, 12));

                  LinearLayout form = card();
                  nameInput = input("CT / INV / tracker / mesa", false);
                  targetInput = input("Ángulo objetivo", true);
                  toleranceInput = input("Tolerancia", true);
                  targetInput.setText("0");
                  toleranceInput.setText("1");
                  form.addView(label("Referencia de medida"));
                  form.addView(nameInput);
                  form.addView(label("Objetivo y tolerancia en grados"));
                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);
                  row.addView(targetInput, weightLp(1f, 0, 0, 6, 0));
                  row.addView(toleranceInput, weightLp(1f, 6, 0, 0, 0));
                  form.addView(row);
                  root.addView(form, lp(-1, -2, 0, 0, 0, 12));

                  LinearLayout buttons1 = new LinearLayout(this);
                  buttons1.setOrientation(LinearLayout.HORIZONTAL);
                  Button calibrate = button("Calibrar cero", CYAN, Color.rgb(0, 28, 42));
                  Button reset = button("Reset", MUTED, Color.rgb(29, 37, 58));
                  buttons1.addView(calibrate, weightLp(1f, 0, 0, 6, 0));
                  buttons1.addView(reset, weightLp(1f, 6, 0, 0, 0));
                  root.addView(buttons1, lp(-1, -2, 0, 0, 0, 10));

                  Button save = button("Guardar medida CSV", GREEN, Color.rgb(0, 45, 30));
                  root.addView(save, lp(-1, -2, 0, 0, 0, 12));

                  LinearLayout diag = card();
                  sensorText = small("sensor: " + (accelerometer == null ? "NO DISPONIBLE" : accelerometer.getName()));
                  savedText = small("sin mediciones guardadas todavía");
                  diag.addView(sensorText);
                  diag.addView(savedText);
                  root.addView(diag);

                  calibrate.setOnClickListener(v -> {
