              private static final int MUTED = Color.rgb(144, 161, 188);
              private static final int CYAN = Color.rgb(57, 220, 255);
              private static final int GREEN = Color.rgb(51, 255, 152);
              private static final int AMBER = Color.rgb(255, 193, 84);
