      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p app/build/outputs/apk/final
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/final/NivelFV-DaKoNe-v7.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NivelFV-v7-icono-instalador-debug-apk
          path: app/build/outputs/apk/final/NivelFV-DaKoNe-v7.apk
